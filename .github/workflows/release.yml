name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - cuda
          - vulkan
          - cpu

jobs:
  build-cuda:
    name: Build (CUDA)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == 'cuda' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.0'
          method: 'local'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-cuda-src-${{ hashFiles('requirements-base.txt') }}-v2
          restore-keys: pip-cuda-src-

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cuda-${{ hashFiles('main.py', 'core/**', 'tools/**', 'ui/**', 'cli/**') }}
          restore-keys: nuitka-cuda-

      - name: Install dependencies (CUDA)
        run: buildscripts\install-deps.bat cuda
        shell: cmd

      - name: Build release (CUDA)
        run: build.bat cuda release
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: microagent-cuda
          path: dist\cuda\microagent-cuda.exe

  build-vulkan:
    name: Build (Vulkan)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == 'vulkan' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip + Vulkan wheel
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-vulkan-${{ hashFiles('requirements-base.txt') }}-v1
          restore-keys: pip-vulkan-

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-vulkan-${{ hashFiles('main.py', 'core/**', 'tools/**', 'ui/**', 'cli/**') }}
          restore-keys: nuitka-vulkan-

      - name: Install Vulkan SDK
        run: buildscripts\install-vulkan-sdk.bat
        shell: cmd

      - name: Install dependencies (Vulkan)
        run: buildscripts\install-deps.bat vulkan
        shell: cmd

      - name: Build release (Vulkan)
        run: build.bat vulkan release
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: microagent-vulkan
          path: dist\vulkan\microagent-vulkan.exe

  build-cpu:
    name: Build (CPU)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.variant == 'all' || inputs.variant == 'cpu' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-cpu-${{ hashFiles('requirements-base.txt') }}
          restore-keys: pip-cpu-

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-cpu-${{ hashFiles('main.py', 'core/**', 'tools/**', 'ui/**', 'cli/**') }}
          restore-keys: nuitka-cpu-

      - name: Install dependencies (CPU)
        run: buildscripts\install-deps.bat cpu
        shell: cmd

      - name: Build release (CPU)
        run: build.bat cpu release
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: microagent-cpu
          path: dist\cpu\microagent-cpu.exe

  create-release:
    name: Create GitHub Release
    needs: [build-cuda, build-vulkan, build-cpu]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/microagent-cuda/microagent-cuda.exe
            artifacts/microagent-vulkan/microagent-vulkan.exe
            artifacts/microagent-cpu/microagent-cpu.exe
            config.yaml
            README.txt
          generate_release_notes: true
