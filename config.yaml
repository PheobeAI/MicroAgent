# MicroAgent 配置文件
# 将本文件放在 microagent.exe 同级目录

model:
  # GGUF 模型文件路径（相对于本文件，或绝对路径）
  path: ./models/gemma-4-E2B-it-Q4_K_M.gguf
  # GPU 层数：-1 = 全部卸载到 GPU（推荐），0 = 纯 CPU
  n_gpu_layers: -1
  # CPU 推理线程数（建议 4-6，不影响系统其他任务）
  n_threads: 6
  # 上下文长度（token 数）
  # 对话场景下系统提示+工具描述+历史约 1000-2000 token，8192 完全够用。
  # 131072 会导致 KV Cache 占满显存（RTX 4080 16GB），推理速度暴跌。
  n_ctx: 8192
  # 单次最大生成 token 数
  # Gemma thought 块 + 实际回答，2048 对大多数问题足够。
  max_tokens: 2048

agent:
  # 运行模式：tool_calling（推荐）或 code（需要更强模型）
  mode: tool_calling
  # 是否显示 smolagents 内部调试日志（面向开发者，通常设为 false）
  verbose: true
  # 是否将模型的推理思考内容展示给用户（默认开启，可设为 false 静默）
  show_thinking: true

tools:
  web_search:
    enabled: true
    # Tavily API Key（留空则使用 DuckDuckGo 免费搜索）
    # 申请地址：https://tavily.com
    tavily_api_key: ""

  file_manager:
    enabled: true
    # 是否允许写入/删除/移动操作（默认关闭以防误操作）
    allow_destructive: false
    # 破坏性操作允许的目录白名单（空列表 = 不限制）
    allowed_dirs: []

  system_info:
    enabled: true

runtime:
  # 系统提示语言（zh = 中文，en = 英文）
  language: zh
  # log_level: 日志文件的记录级别，与控制台显示无关，默认 info
  # 可选值：debug / info / warning / error
  log_level: info
  # console_verbose: 是否在控制台输出调试信息（smolagents 内部推理步骤等）
  # 仅影响终端显示，不影响日志文件内容
  console_verbose: true

memory:
  enabled: true
  # SQLite 路径（相对于本配置文件；main.py 通过 resolve_relative() 转绝对路径）
  db_path: memory\microagent.db
  # 上下文窗口大小（token 数），与 model.n_ctx 保持一致
  context_window_tokens: 8192
  # 自动压缩阈值：context 占用超过此比例时触发（步骤 3 生效）
  compression_threshold: 0.80
  # 压缩时保留最近 N 轮对话不压缩
  keep_recent_turns: 6
  # 压缩后保留的最小空余 token 数
  post_compact_reserve: 40960
  # 启动时注入 prefix 的相关历史条数（0 = 完全懒加载；步骤 4 生效）
  max_episodes_in_prefix: 5
  # 压缩摘要 prompt 的自定义指令（留空使用默认）
  pre_compact_instructions: ""
  # 工具输出超过此字符数时 offload（步骤 3 生效）
  max_tool_output_chars: 8000
  # 少于此轮数时跳过 LLM 摘要，直接存原文（步骤 3 生效）
  min_turns_to_save: 3
  retrieval:
    bm25_weight: 0.5        # BM25 相关性权重 α（步骤 5 生效）
    recency_weight: 0.3     # 时间衰减权重 β
    importance_weight: 0.2  # 重要性权重 γ
    decay_rate: 0.1         # 时间衰减率 λ（半衰期约 7 天）
